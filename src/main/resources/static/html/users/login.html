<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="/css/ppc.css">
    <script src="/js/loginScript.js" type="text/javascript"></script>
</head>
<body>
    <div class="login-container login-page">
        <h2>用户登录</h2>
        <div id="msg" style="color: red; height: 50px;" class="flex"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名：</label>
                <input type="text" name="username">
            </div>
            <div class="form-group">
                <label>密码：</label>
                <input type="password" name="password">
            </div>
            <div class="form-group">
                <label>验证码：</label>
                <div class="captcha-row">
                    <input type="text" name="captcha">
                    <a href="#" onclick="refreshFunction()"><img src="/varificationcode" id="mycode" alt="验证码"></a>
                </div>
            </div>
            <input class="login-btn" type="button" value="登录" onclick="loginFunction()">
        </form>
        <a href="/html/users/register.html" class="register">去注册</a>
    </div>

    <ul class="footer-links">
        <li><a href="">关于我们</a></li>
        <li><a href="">联系我们</a></li>
        <li><a href="">商家入驻</a></li>
    </ul>

    <div class="bottom">棍之未来.com 版权所有</div>
</body>
</html>
