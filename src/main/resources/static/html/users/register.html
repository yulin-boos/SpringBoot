<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="/css/ppc.css">
    <script src="/js/registerScript.js" type="text/javascript"></script>
</head>
<body>
    <div class="login-container">
        <h2>用户注册</h2>

        <form id="regForm">
            <div class="form-group">
                <label for="username">用户名：</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label for="password">设置密码：</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <div class="form-group">
                <label for="repassword">确认密码：</label>
                <input type="password" id="repassword" name="repassword" placeholder="请再次输入密码" required>
            </div>

            <div id="msg"></div>
            <div class="btn-group" style="display: flex; gap: 10px;">
                <button type="button" class="login-btn" style="flex: 2;" onclick="checkRegisterFunction()">立即注册</button>
                <button type="reset" class="login-btn" style="flex: 1; background-color: #ccc; color: #333;">重置</button>
            </div>
        </form>
        <a href="/html/users/login.html" class="register">已有账号？去登录</a>
    </div>

    <ul class="footer-links">
        <li><a href="">关于我们</a></li>
        <li><a href="">联系我们</a></li>
        <li><a href="">商家入驻</a></li>
    </ul>

    <div class="bottom">棍之未来.com 版权所有</div>
</body>
</html>
